<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Pastoreo Online | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #059669;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight text-emerald-700">CAMPUS PASTOREO</h1>
            <p class="text-gray-500 mt-2 font-medium">Acceso Privado para Alumnos</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre de Usuario</label>
                <input type="text" id="username" name="user" required 
                    placeholder="Tu usuario del Excel"
                    class="mt-1 block w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="password" name="pass" required 
                    placeholder="••••••••"
                    class="mt-1 block w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all">
            </div>
            <button type="submit" id="submitBtn" 
                class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-4 focus:ring-emerald-200 transition-all active:scale-95">
                Entrar al Campus
            </button>
        </form>
        
        <div id="errorMessage" class="hidden mt-6 p-3 bg-red-50 border border-red-100 text-red-600 text-sm text-center rounded-lg font-medium"></div>
    </div>

    <script>
        // ID de tu Google Apps Script (Versión Dinámica)
        const SCRIPT_ID = "AKfycbxNCBM7RpjnNCoDCl9M9Gyrg9pg9z3Oq8S0e0ixxH-wafhpyhtXF876lR_U2G-0F3FAOg";
        const SCRIPT_URL = `https://script.google.com/macros/s/${SCRIPT_ID}/exec`;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMessage');
            const originalText = submitBtn.innerText;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span> Verificando datos...';
            errorDiv.classList.add('hidden');

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                const finalUrl = `${SCRIPT_URL}?user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`;

                const response = await fetch(finalUrl, {
                    method: 'GET',
                    mode: 'cors',
                    redirect: 'follow'
                });

                if (!response.ok) throw new Error('Error en el servidor de Google');

                const result = await response.json();

                if (result.success) {
                    // --- PASO CLAVE: Guardar los datos dinámicos en la sesión ---
                    sessionStorage.setItem('alumnoData', JSON.stringify(result));
                    
                    // Redirección a la página de plantilla dinámica
                    // Asegúrate de tener el archivo "alumno_dinamico.html" en la carpeta /alumnos/
                    window.location.href = `./alumnos/alumno.html`;
                } else {
                    errorDiv.innerText = result.message || "Usuario o contraseña incorrectos.";
                    errorDiv.classList.remove('hidden');
                }

            } catch (error) {
                console.error("Error de login:", error);
                errorDiv.innerText = "No se pudo conectar con el sistema. Revisa tu conexión.";
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
            }
        });
    </script>

        })();
    </script>

</body>
</html>

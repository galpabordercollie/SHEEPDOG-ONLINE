<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Alumnos | Campus Pastoreo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Tarjeta de Login -->
    <div class="glass-card w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl border border-white">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-emerald-50 rounded-3xl mb-4">
                <span class="text-4xl">🐑</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">CAMPUS PASTOREO</h1>
            <p class="text-slate-500 font-medium mt-1">Acceso Privado para Alumnos</p>
        </div>

        <!-- Formulario -->
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Nombre de Usuario</label>
                <input type="text" id="userInput" required 
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/20 outline-none font-medium transition-all" 
                    placeholder="Tu nombre">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Contraseña</label>
                <input type="password" id="passInput" required 
                    class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-emerald-500/20 outline-none font-medium transition-all" 
                    placeholder="••••••••">
            </div>
            <button type="submit" id="submitBtn" 
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform active:scale-95">
                Entrar al Campus
            </button>
        </form>

        <!-- Mensajes de Estado -->
        <div id="statusMsg" class="mt-6 text-center text-sm font-semibold hidden p-4 rounded-2xl"></div>
    </div>

    <script>
        /**
         * URL DEL SCRIPT
         */
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyB27KkQ4T5_Y9u-1pJxd7vrFxsBxz68QBEswYiaygkFoDuOxIgAyAYfjuTBdxF8asDug/exec";

        const loginForm = document.getElementById('loginForm');
        const statusMsg = document.getElementById('statusMsg');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            statusMsg.className = "mt-6 text-center text-sm font-semibold p-4 rounded-2xl bg-blue-50 text-blue-600 block";
            statusMsg.innerText = "Conectando con el servidor...";

            const user = document.getElementById('userInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();

            try {
                // Petición al Script de Google con modo cors explícito
                const response = await fetch(`${SCRIPT_URL}?user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                if (!response.ok) throw new Error("Servidor no disponible");
                
                const data = await response.json();

                if (data.success) {
                    statusMsg.innerText = "¡Bienvenido! Entrando...";
                    statusMsg.className = "mt-6 text-center text-sm font-semibold p-4 rounded-2xl bg-emerald-50 text-emerald-600 block";
                    
                    // Almacenamos los datos para la plantilla
                    sessionStorage.setItem('alumnoData', JSON.stringify(data));
                    
                    // Redirección simplificada: asume que la carpeta 'alumnos' está al mismo nivel que index.html
                    setTimeout(() => {
                        window.location.href = "alumnos/Alumno.html";
                    }, 500);
                } else {
                    showError(data.message || "Usuario o contraseña incorrectos");
                }
            } catch (error) {
                console.error("Error de login:", error);
                showError("Error de conexión. Verifica que el Script esté publicado para 'Cualquiera'.");
            } finally {
                if (!statusMsg.innerText.includes("Entrando")) {
                    submitBtn.disabled = false;
                }
            }
        });

        function showError(msg) {
            statusMsg.innerText = msg;
            statusMsg.className = "mt-6 text-center text-sm font-semibold p-4 rounded-2xl bg-red-50 text-red-600 block";
        }
    </script>
</body>
</html>

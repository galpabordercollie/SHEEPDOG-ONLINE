<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Clases | Campus Pastoreo</title>
    <!-- Carga correcta de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="bg-emerald-700 p-4 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="font-bold flex items-center tracking-tight">
                <span class="mr-2 text-xl">🐑</span> CAMPUS PASTOREO
            </span>
            <div class="flex items-center space-x-4">
                <span id="userNameDisplay" class="text-xs bg-emerald-800 px-4 py-1.5 rounded-full font-semibold border border-emerald-600/50">Cargando...</span>
                <button onclick="logout()" class="text-xs bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg transition-colors">Salir</button>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="max-w-4xl mx-auto p-6 min-h-screen">
        <header class="mb-10 pt-4">
            <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">Tu Historial de Clases</h1>
            <p class="text-slate-500 mt-2 text-lg">Revisa tus progresos, entrenamientos y correcciones técnicas.</p>
        </header>

        <!-- CONTENEDOR DE CLASES -->
        <div id="classesContainer" class="space-y-12">
            <!-- Loader visual mientras cargan los datos -->
            <div class="text-center py-24">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="mt-4 text-slate-400 font-medium">Sincronizando con tu ficha en el Excel...</p>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-white border-t border-slate-200 py-10 mt-12">
        <div class="max-w-4xl mx-auto px-6 text-center text-slate-400 text-sm">
            <p>&copy; 2024 Campus Pastoreo Online. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>
        function logout() {
            sessionStorage.clear();
            window.location.href = "../index.html";
        }

        window.onload = function() {
            const rawData = sessionStorage.getItem('alumnoData');
            
            if (!rawData) {
                window.location.href = "../index.html";
                return;
            }

            let userData;
            try {
                userData = JSON.parse(rawData);
            } catch (e) {
                window.location.href = "../index.html";
                return;
            }
            
            if (!userData || !userData.success) {
                window.location.href = "../index.html";
                return;
            }

            document.getElementById('userNameDisplay').innerText = `Alumno: ${userData.user || 'Usuario'}`;
            
            const container = document.getElementById('classesContainer');
            container.innerHTML = ""; 

            if (!userData.classes || userData.classes.length === 0) {
                container.innerHTML = `
                    <div class="bg-white border-2 border-dashed border-slate-200 rounded-3xl p-12 text-center text-slate-400">
                        <p class="text-xl font-medium">Aún no hay clases registradas para ti.</p>
                        <p class="text-sm mt-2">En cuanto tu instructor suba una corrección, aparecerá aquí.</p>
                    </div>
                `;
                return;
            }

            userData.classes.forEach(clase => {
                const videoId = clase.videoUrl || "";
                const videoSrc = videoId ? `https://www.youtube.com/embed/${videoId}` : "";
                
                const card = `
                    <article class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden transition-all hover:shadow-xl hover:-translate-y-1 group">
                        <div class="p-6 md:p-8 border-b border-slate-50 flex flex-col md:flex-row md:justify-between md:items-center gap-4 bg-slate-50/30">
                            <div>
                                <span class="inline-block px-3 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-bold uppercase tracking-widest rounded-md mb-2">
                                    ${clase.tipo || 'Clase'}
                                </span>
                                <h3 class="text-2xl font-bold text-slate-800 group-hover:text-emerald-700 transition-colors">
                                    ${clase.titulo || 'Sin Título'}
                                </h3>
                            </div>
                            <div class="flex items-center text-slate-400 bg-white px-4 py-2 rounded-xl border border-slate-100 shadow-sm self-start md:self-center">
                                <span class="mr-2 text-base">📅</span>
                                <span class="text-sm font-bold">${clase.fecha || '--/--/----'}</span>
                            </div>
                        </div>
                        
                        <div class="relative aspect-video w-full bg-slate-900">
                            ${videoId ? `
                                <iframe 
                                    class="absolute top-0 left-0 w-full h-full" 
                                    src="${videoSrc}" 
                                    frameborder="0" 
                                    allowfullscreen>
                                </iframe>
                            ` : `
                                <div class="absolute inset-0 flex items-center justify-center text-slate-500 font-bold">Video no disponible</div>
                            `}
                        </div>

                        <div class="p-6 md:p-8 bg-white">
                            <div class="flex items-start">
                                <div class="bg-emerald-50 p-3 rounded-2xl mr-4 mt-1">
                                    <span class="text-xl">📝</span>
                                </div>
                                <div>
                                    <h4 class="text-sm font-extrabold text-slate-800 uppercase tracking-tighter mb-2">Comentarios del Instructor</h4>
                                    <p class="text-slate-600 text-base leading-relaxed whitespace-pre-line font-medium">
                                        ${clase.notas || "Sin notas adicionales para esta sesión."}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </article>
                `;
                container.innerHTML += card;
            });
        };
    </script>
</body>
</html>

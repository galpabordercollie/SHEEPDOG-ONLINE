<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ETIQUETAS PARA EVITAR CACHÉ (FUERZA LA CARGA DE CAMBIOS NUEVOS) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Mi Panel | Campus Pastoreo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 1.5rem 1.5rem 0 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="bg-emerald-700 p-4 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🐑</span>
                <span class="font-bold tracking-tight uppercase">Campus Pastoreo</span>
            </div>
            <div class="flex items-center space-x-3">
                <!-- INDICADOR DE VERSIÓN -->
                <span class="text-[10px] bg-white/20 text-white/80 px-2 py-0.5 rounded font-mono border border-white/10">v1.0.6</span>
                
                <!-- NOMBRE DEL ALUMNO FORMATEADO -->
                <span id="displayUserName" class="hidden md:inline text-xs font-bold bg-emerald-800 px-3 py-1.5 rounded-lg border border-emerald-600/50 uppercase tracking-wide"></span>
                
                <button onclick="logout()" class="text-xs font-bold bg-rose-500 hover:bg-rose-600 px-4 py-2 rounded-full transition-all shadow-sm active:scale-95">
                    Salir
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-8 min-h-screen">
        
        <!-- CABECERA -->
        <header class="mb-10 text-center">
            <h2 class="text-3xl font-extrabold text-slate-800 mb-2">Historial de Clases</h2>
            <p class="text-lg text-slate-600">Revisa tus videos y las correcciones en orden cronológico.</p>
        </header>

        <!-- CONTENEDOR DE CLASES - AHORA EN UNA SOLA LÍNEA (COLUMNA) -->
        <div id="classesGrid" class="flex flex-col gap-10">
            <!-- Loader inicial -->
            <div class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="mt-4 text-slate-500 font-medium tracking-tight">Cargando tus entrenamientos...</p>
            </div>
        </div>

    </main>

    <footer class="mt-12 py-8 bg-white border-t border-slate-200 text-center">
        <p class="text-slate-400 text-[10px] uppercase tracking-widest font-bold">© 2026 Campus Pastoreo Online • v1.0.6</p>
    </footer>

    <script>
        /**
         * Función para formatear fechas a DD/MM/AAAA
         */
        function formatearFecha(fechaSucia) {
            if (!fechaSucia) return "--/--/--";
            try {
                const d = new Date(fechaSucia);
                if (!isNaN(d.getTime())) {
                    const dia = String(d.getDate()).padStart(2, '0');
                    const mes = String(d.getMonth() + 1).padStart(2, '0');
                    const anio = d.getFullYear();
                    return `${dia}/${mes}/${anio}`;
                }
                return fechaSucia;
            } catch (e) {
                return fechaSucia;
            }
        }

        /**
         * Función para cerrar sesión y limpiar datos
         */
        function logout() {
            sessionStorage.clear();
            window.location.href = "../index.html?v=" + new Date().getTime();
        }

        window.onload = function() {
            const rawData = sessionStorage.getItem('alumnoData');
            
            if (!rawData) {
                window.location.href = "../index.html";
                return;
            }

            const data = JSON.parse(rawData);
            
            document.getElementById('displayUserName').innerText = "Alumno: " + data.user;

            const grid = document.getElementById('classesGrid');
            grid.innerHTML = ""; 

            if (!data.classes || data.classes.length === 0) {
                grid.innerHTML = `
                    <div class="bg-white p-16 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center">
                        <div class="text-4xl mb-4">📂</div>
                        <p class="text-slate-400 text-lg font-bold">No se encontraron clases en tu registro.</p>
                    </div>
                `;
                return;
            }

            data.classes.forEach((clase, index) => {
                const card = document.createElement('article');
                card.className = "bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden hover:shadow-xl transition-all duration-300 flex flex-col group";
                
                const videoId = clase.videoUrl;
                const fechaCorta = formatearFecha(clase.fecha);

                card.innerHTML = `
                    <div class="video-container">
                        <iframe 
                            src="https://www.youtube.com/embed/${videoId}" 
                            title="Video de entrenamiento" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    <div class="p-8 flex-grow flex flex-col">
                        <div class="flex justify-between items-start mb-6">
                            <h3 class="text-2xl font-bold text-slate-800 leading-tight group-hover:text-emerald-700 transition-colors">
                                ${clase.titulo || 'Entrenamiento sin título'}
                            </h3>
                            <div class="text-right ml-4 shrink-0">
                                <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Fecha</span>
                                <span class="text-sm font-black text-slate-600">${fechaCorta}</span>
                            </div>
                        </div>
                        
                        <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 flex-grow">
                            <h4 class="text-[11px] font-extrabold text-emerald-600 uppercase mb-3 tracking-widest flex items-center">
                                <span class="mr-2">💬</span> Comentarios del Instructor
                            </h4>
                            <p class="text-slate-700 text-base leading-relaxed whitespace-pre-line">
                                "${clase.notas || 'Buen trabajo en esta sesión.'}"
                            </p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        };
    </script>
</body>
</html>

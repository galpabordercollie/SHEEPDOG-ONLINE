<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel | Campus Pastoreo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 1rem 1rem 0 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="bg-emerald-700 p-4 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🐑</span>
                <span class="font-bold tracking-tight">CAMPUS PASTOREO</span>
            </div>
            <div class="flex items-center space-x-4">
                <span id="displayUserName" class="hidden md:inline text-sm font-medium bg-emerald-800 px-3 py-1 rounded-lg"></span>
                <button onclick="logout()" class="text-sm font-semibold bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full transition-all">
                    Salir
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 min-h-screen">
        
        <!-- CABECERA -->
        <header class="mb-10">
            <h2 class="text-3xl font-extrabold text-slate-800 mb-2">Historial de Clases</h2>
            <p class="text-lg text-slate-600">Revisa tus videos y las correcciones de tus entrenamientos.</p>
        </header>

        <!-- CONTENEDOR DE CLASES DINÁMICAS -->
        <div id="classesGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Loader inicial -->
            <div class="col-span-full text-center py-20">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="mt-4 text-slate-500 font-medium">Cargando tus entrenamientos...</p>
            </div>
        </div>

    </main>

    <footer class="mt-12 py-8 bg-white border-t border-slate-200 text-center">
        <p class="text-slate-400 text-xs">© 2026 Campus Pastoreo Online - Gestión de Entrenamiento</p>
    </footer>

    <script>
        // Función para cerrar sesión
        function logout() {
            sessionStorage.clear();
            window.location.href = "../index.html";
        }

        window.onload = function() {
            // 1. Obtener datos del sessionStorage
            const rawData = sessionStorage.getItem('alumnoData');
            
            if (!rawData) {
                // Si no hay datos, volver al login
                window.location.href = "../index.html";
                return;
            }

            const data = JSON.parse(rawData);
            
            // 2. Mostrar nombre de usuario
            document.getElementById('displayUserName').innerText = "Alumno: " + data.user;

            const grid = document.getElementById('classesGrid');
            grid.innerHTML = ""; // Limpiar loader

            // 3. Verificar si hay clases
            if (!data.classes || data.classes.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full bg-white p-12 rounded-[2rem] border-2 border-dashed border-slate-200 text-center">
                        <p class="text-slate-400 text-lg font-medium">Aún no hay clases registradas en tu ficha.</p>
                    </div>
                `;
                return;
            }

            // 4. Renderizar clases en el orden en que vienen (Fila por Fila)
            data.classes.forEach(clase => {
                const card = document.createElement('article');
                card.className = "bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow flex flex-col";
                
                // Formatear el ID de video por si acaso viene la URL completa
                const videoId = clase.videoUrl;

                card.innerHTML = `
                    <div class="video-container">
                        <iframe 
                            src="https://www.youtube.com/embed/${videoId}" 
                            title="Video de clase" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    <div class="p-6 flex-grow flex flex-col">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest bg-emerald-50 px-2 py-1 rounded-md">
                                    ${clase.tipo || 'Entrenamiento'}
                                </span>
                                <h3 class="text-xl font-bold text-slate-800 mt-1">${clase.titulo || 'Sin título'}</h3>
                            </div>
                            <span class="text-xs font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-md border">
                                ${clase.fecha || '--/--/--'}
                            </span>
                        </div>
                        
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex-grow">
                            <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-tight">Notas del Instructor</h4>
                            <p class="text-slate-600 text-sm leading-relaxed whitespace-pre-line">
                                ${clase.notas || 'No hay notas adicionales para esta sesión.'}
                            </p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Mi Panel | Campus Pastoreo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 2rem 2rem 0 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-emerald-100">

    <nav class="bg-emerald-700 p-3 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <img src="../Imagenes/Logo Galpa.gif" alt="Logo Galpa" class="logo-img rounded-full bg-white p-1" onerror="this.style.display='none'">
                <div class="flex items-center space-x-2">
                    <span class="text-2xl">🐑</span>
                    <span class="font-black tracking-tighter uppercase text-sm md:text-lg">Campus Pastoreo</span>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <span class="hidden sm:inline-block text-[10px] bg-emerald-800 text-emerald-100 px-3 py-1 rounded-full font-mono border border-emerald-600 font-bold uppercase tracking-widest">v1.1.5</span>
                <span id="displayUserName" class="hidden md:inline text-xs font-bold bg-white/10 px-3 py-1.5 rounded-lg border border-white/20 uppercase tracking-widest"></span>
                <button onclick="logout()" class="text-xs font-black bg-rose-500 hover:bg-rose-600 px-5 py-2.5 rounded-full transition-all shadow-md active:scale-95 uppercase tracking-widest">
                    Salir
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-10 min-h-screen">
        <header class="mb-12 text-center">
            <h2 class="text-4xl font-black text-slate-800 mb-3 tracking-tight">Historial de Clases</h2>
            <p class="text-lg text-slate-500 font-medium">Visualiza tus progresos y resuelve tus dudas con el instructor.</p>
        </header>

        <div id="classesGrid" class="flex flex-col gap-12">
            <div class="text-center py-24">
                <div class="inline-block animate-spin rounded-full h-14 w-14 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="mt-6 text-slate-400 font-bold uppercase tracking-widest text-xs">Cargando tus clases...</p>
            </div>
        </div>
    </main>

    <footer class="mt-20 py-10 bg-white border-t border-slate-200 text-center">
        <p class="text-slate-400 text-[10px] uppercase tracking-widest font-black">© 2026 Campus Pastoreo Online • Gestión Deportiva Galpa • v1.1.5</p>
    </footer>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNCBM7RpjnNCoDCl9M9Gyrg9pg9z3Oq8S0e0ixxH-wafhpyhtXF876lR_U2G-qF3FAOg/exec";

        function formatearFecha(fechaSucia) {
            if (!fechaSucia) return "--/--/--";
            try {
                const d = new Date(fechaSucia);
                if (!isNaN(d.getTime())) {
                    const dia = String(d.getDate()).padStart(2, '0');
                    const mes = String(d.getMonth() + 1).padStart(2, '0');
                    const anio = d.getFullYear();
                    return `${dia}/${mes}/${anio}`;
                }
                return fechaSucia;
            } catch (e) { return fechaSucia; }
        }

        async function guardarComentario(btn, user, fecha, titulo, index) {
            const container = btn.closest('.comment-box');
            const textarea = container.querySelector('textarea');
            const originalText = btn.innerText;
            const nuevoComentario = textarea.value.trim();

            if (!nuevoComentario) {
                textarea.focus();
                return;
            }

            btn.disabled = true;
            btn.innerText = "GUARDANDO...";
            textarea.disabled = true;

            try {
                // 1. Guardar localmente para que no desaparezca al recargar
                let sessionData = JSON.parse(sessionStorage.getItem('alumnoData'));
                if (sessionData && sessionData.classes[index]) {
                    sessionData.classes[index].notasAlumno = nuevoComentario;
                    sessionStorage.setItem('alumnoData', JSON.stringify(sessionData));
                }

                // 2. Enviar al Excel (Usando URLSearchParams para mayor compatibilidad con Apps Script POST)
                const params = new URLSearchParams();
                params.append('action', 'updateAlumnoNotas');
                params.append('user', user);
                params.append('fecha', fecha);
                params.append('titulo', titulo);
                params.append('notasAlumno', nuevoComentario);

                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Mantenemos no-cors pero los parámetros están en el body
                    body: params
                });

                // Éxito visual
                btn.innerText = "¡ENVIADO!";
                btn.classList.replace('bg-emerald-600', 'bg-blue-600');
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = originalText;
                    btn.classList.replace('bg-blue-600', 'bg-emerald-600');
                    textarea.disabled = false;
                }, 3000);

            } catch (error) {
                console.error("Error:", error);
                btn.innerText = "ERROR";
                textarea.disabled = false;
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = originalText;
                }, 3000);
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "../index.html?v=" + new Date().getTime();
        }

        window.onload = function() {
            const rawData = sessionStorage.getItem('alumnoData');
            if (!rawData) { window.location.href = "../index.html"; return; }

            const data = JSON.parse(rawData);
            document.getElementById('displayUserName').innerText = "ALUMNO: " + data.user;

            const grid = document.getElementById('classesGrid');
            grid.innerHTML = ""; 

            if (!data.classes || data.classes.length === 0) {
                grid.innerHTML = `<div class="bg-white p-20 rounded-[3rem] text-center border-4 border-dashed border-slate-200"><p class="text-slate-400 font-black">No hay clases aún.</p></div>`;
                return;
            }

            data.classes.forEach((clase, index) => {
                const card = document.createElement('article');
                card.className = "bg-white rounded-[3rem] shadow-xl border border-slate-200 overflow-hidden flex flex-col transition-all hover:translate-y-[-4px]";
                
                const videoId = clase.videoUrl;
                const fechaCorta = formatearFecha(clase.fecha);

                card.innerHTML = `
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="p-8 md:p-10 flex flex-col gap-8">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-3xl font-black text-slate-800 leading-tight uppercase italic">${clase.titulo || 'Entrenamiento'}</h3>
                                <p class="text-emerald-600 font-bold text-xs uppercase tracking-widest mt-1">${clase.tipo || 'Clase'}</p>
                            </div>
                            <div class="text-right bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                <span class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Fecha</span>
                                <span class="text-sm font-black text-slate-800">${fechaCorta}</span>
                            </div>
                        </div>
                        
                        <div class="bg-emerald-50/50 p-7 rounded-[2.5rem] border border-emerald-100/50">
                            <h4 class="text-[11px] font-black text-emerald-600 uppercase mb-3 tracking-widest flex items-center">
                                <span class="mr-2 text-lg">📢</span> Feedback del Instructor
                            </h4>
                            <p class="text-slate-700 text-lg italic font-medium">"${clase.notas || 'Buen trabajo en esta sesión.'}"</p>
                        </div>

                        <div class="comment-box flex flex-col gap-4 pt-4 border-t border-slate-100">
                            <h4 class="text-[11px] font-black text-slate-400 uppercase flex items-center tracking-widest">
                                <span class="mr-2 text-lg">🙋‍♂️</span> Tus dudas o comentarios
                            </h4>
                            <textarea 
                                class="w-full bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] p-5 text-base focus:border-emerald-500 outline-none transition-all resize-none text-slate-700 font-semibold"
                                rows="3"
                                placeholder="Escribe aquí tu duda..."
                            >${clase.notasAlumno || ""}</textarea>
                            <button 
                                onclick="guardarComentario(this, '${data.user}', '${clase.fecha}', '${clase.titulo}', ${index})"
                                class="self-end bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-black py-4 px-10 rounded-full transition-all active:scale-95 shadow-lg uppercase tracking-widest"
                            >Enviar Comentario</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta etiquetas para evitar que el navegador guarde una versión vieja en caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Mi Panel | Campus Pastoreo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Contenedor de video con relación de aspecto 16:9 */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 2rem 2rem 0 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-emerald-100">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="bg-emerald-700 p-3 text-white shadow-lg sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <!-- LOGOTIPO GALPA -->
                <img src="../Imagenes/Logo Galpa.gif" alt="Logo Galpa" class="logo-img rounded-full bg-white p-1" onerror="this.style.display='none'">
                <div class="flex items-center space-x-2">
                    <span class="text-2xl">🐑</span>
                    <span class="font-black tracking-tighter uppercase text-sm md:text-lg">Campus Pastoreo</span>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <!-- INDICADOR DE VERSIÓN -->
                <span class="hidden sm:inline-block text-[10px] bg-emerald-800 text-emerald-100 px-3 py-1 rounded-full font-mono border border-emerald-600 font-bold uppercase tracking-widest">v1.1.0</span>
                
                <span id="displayUserName" class="hidden md:inline text-xs font-bold bg-white/10 px-3 py-1.5 rounded-lg border border-white/20 uppercase tracking-widest"></span>
                
                <button onclick="logout()" class="text-xs font-black bg-rose-500 hover:bg-rose-600 px-5 py-2.5 rounded-full transition-all shadow-md active:scale-95 uppercase tracking-widest">
                    Salir
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-10 min-h-screen">
        
        <!-- ENCABEZADO -->
        <header class="mb-12 text-center">
            <h2 class="text-4xl font-black text-slate-800 mb-3 tracking-tight">Historial de Clases</h2>
            <p class="text-lg text-slate-500 font-medium">Visualiza tus progresos y resuelve tus dudas con el instructor.</p>
        </header>

        <!-- CONTENEDOR DE CLASES (UNA SOLA COLUMNA) -->
        <div id="classesGrid" class="flex flex-col gap-12">
            <!-- Loader visual mientras cargan los datos -->
            <div class="text-center py-24">
                <div class="inline-block animate-spin rounded-full h-14 w-14 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="mt-6 text-slate-400 font-bold uppercase tracking-widest text-xs">Sincronizando con tu Excel...</p>
            </div>
        </div>

    </main>

    <footer class="mt-20 py-10 bg-white border-t border-slate-200 text-center">
        <p class="text-slate-400 text-[10px] uppercase tracking-widest font-black">© 2026 Campus Pastoreo Online • Gestión Deportiva Galpa • v1.1.0</p>
    </footer>

    <script>
        // URL de tu Script de Google Apps Script
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNCBM7RpjnNCoDCl9M9Gyrg9pg9z3Oq8S0e0ixxH-wafhpyhtXF876lR_U2G-qF3FAOg/exec";

        function formatearFecha(fechaSucia) {
            if (!fechaSucia) return "--/--/--";
            try {
                const d = new Date(fechaSucia);
                if (!isNaN(d.getTime())) {
                    const dia = String(d.getDate()).padStart(2, '0');
                    const mes = String(d.getMonth() + 1).padStart(2, '0');
                    const anio = d.getFullYear();
                    return `${dia}/${mes}/${anio}`;
                }
                return fechaSucia;
            } catch (e) { return fechaSucia; }
        }

        async function guardarComentario(btn, user, fecha, titulo) {
            const container = btn.closest('.comment-box');
            const textarea = container.querySelector('textarea');
            const originalText = btn.innerText;
            const nuevoComentario = textarea.value.trim();

            if (!nuevoComentario) {
                textarea.focus();
                textarea.classList.add('ring-2', 'ring-rose-400');
                setTimeout(() => textarea.classList.remove('ring-2', 'ring-rose-400'), 2000);
                return;
            }

            btn.disabled = true;
            btn.innerText = "GUARDANDO...";
            textarea.disabled = true;

            try {
                // Envío de datos al script de Google mediante POST
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'updateAlumnoNotas',
                        user: user,
                        fecha: fecha,
                        titulo: titulo,
                        notasAlumno: nuevoComentario
                    })
                });

                btn.innerText = "¡ENVIADO!";
                btn.classList.replace('bg-emerald-600', 'bg-blue-600');
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = originalText;
                    btn.classList.replace('bg-blue-600', 'bg-emerald-600');
                    textarea.disabled = false;
                }, 3000);

            } catch (error) {
                console.error("Error:", error);
                btn.innerText = "ERROR AL GUARDAR";
                btn.classList.replace('bg-emerald-600', 'bg-rose-500');
                textarea.disabled = false;
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = originalText;
                    btn.classList.replace('bg-rose-500', 'bg-emerald-600');
                }, 3000);
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "../index.html?v=" + new Date().getTime();
        }

        window.onload = function() {
            const rawData = sessionStorage.getItem('alumnoData');
            if (!rawData) { window.location.href = "../index.html"; return; }

            const data = JSON.parse(rawData);
            document.getElementById('displayUserName').innerText = "HOLA, " + data.user;

            const grid = document.getElementById('classesGrid');
            grid.innerHTML = ""; 

            if (!data.classes || data.classes.length === 0) {
                grid.innerHTML = `
                    <div class="bg-white p-20 rounded-[3rem] border-4 border-dashed border-slate-200 text-center">
                        <div class="text-5xl mb-6">📂</div>
                        <p class="text-slate-400 text-xl font-black uppercase tracking-tight">No hay clases en tu registro todavía.</p>
                    </div>
                `;
                return;
            }

            data.classes.forEach((clase) => {
                const card = document.createElement('article');
                card.className = "bg-white rounded-[3rem] shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden flex flex-col group transition-all hover:translate-y-[-4px]";
                
                const videoId = clase.videoUrl;
                const fechaCorta = formatearFecha(clase.fecha);

                card.innerHTML = `
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="p-8 md:p-10 flex flex-col gap-8">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-3xl font-black text-slate-800 leading-tight tracking-tight group-hover:text-emerald-700 transition-colors uppercase italic">${clase.titulo || 'Entrenamiento'}</h3>
                                <p class="text-emerald-600 font-bold text-xs uppercase tracking-widest mt-1">${clase.tipo || 'Clase Online'}</p>
                            </div>
                            <div class="text-right bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                <span class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Fecha</span>
                                <span class="text-sm font-black text-slate-800 tracking-tighter">${fechaCorta}</span>
                            </div>
                        </div>
                        
                        <!-- NOTAS DEL INSTRUCTOR -->
                        <div class="bg-emerald-50/50 p-7 rounded-[2.5rem] border border-emerald-100/50 relative">
                            <h4 class="text-[11px] font-black text-emerald-600 uppercase mb-3 tracking-widest flex items-center">
                                <span class="mr-2 text-lg">📢</span> Feedback del Instructor
                            </h4>
                            <p class="text-slate-700 text-lg leading-relaxed italic font-medium">
                                "${clase.notas || 'Buen trabajo en esta sesión. Sigue practicando los fundamentos.'}"
                            </p>
                        </div>

                        <!-- DUDA DEL ALUMNO (NUEVO) -->
                        <div class="comment-box flex flex-col gap-4 pt-4 border-t border-slate-100">
                            <h4 class="text-[11px] font-black text-slate-400 uppercase flex items-center tracking-widest">
                                <span class="mr-2 text-lg">🙋‍♂️</span> Tus dudas o comentarios
                            </h4>
                            <textarea 
                                class="w-full bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] p-5 text-base focus:ring-4 focus:ring-emerald-500/10 focus:border-emerald-500 outline-none transition-all resize-none text-slate-700 font-semibold placeholder:text-slate-300"
                                rows="3"
                                placeholder="Escribe aquí cualquier pregunta para Nati o Cristóbal..."
                            >${clase.notasAlumno || ""}</textarea>
                            <button 
                                onclick="guardarComentario(this, '${data.user}', '${clase.fecha}', '${clase.titulo}')"
                                class="self-end bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-black py-4 px-10 rounded-full transition-all active:scale-95 shadow-lg shadow-emerald-200 uppercase tracking-widest"
                            >Enviar Comentario</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        };
    </script>
</body>
</html>

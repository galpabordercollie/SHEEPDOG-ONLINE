<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>Mi Panel | Campus Pastoreo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 1.5rem 1.5rem 0 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .logo-img {
            height: 40px;
            width: auto;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="bg-emerald-700 p-3 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="../Imagenes/Logo Galpa.gif" alt="Logo Galpa" class="logo-img rounded-full bg-white p-0.5" onerror="this.style.display='none'">
                <div class="flex items-center space-x-2">
                    <span class="text-xl">🐑</span>
                    <span class="font-bold tracking-tight uppercase text-sm md:text-base">Campus Pastoreo</span>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <span class="hidden sm:inline-block text-[9px] bg-white/20 text-white/80 px-2 py-0.5 rounded font-mono border border-white/10">v1.1.0</span>
                <span id="displayUserName" class="hidden md:inline text-xs font-bold bg-emerald-800 px-3 py-1.5 rounded-lg border border-emerald-600/50 uppercase tracking-wide"></span>
                <button onclick="logout()" class="text-xs font-bold bg-rose-500 hover:bg-rose-600 px-4 py-2 rounded-full transition-all shadow-sm active:scale-95">
                    Salir
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto p-4 md:p-8 min-h-screen">
        <header class="mb-10 text-center">
            <h2 class="text-3xl font-extrabold text-slate-800 mb-2">Historial de Clases</h2>
            <p class="text-lg text-slate-600">Revisa tus videos y deja tus dudas al instructor.</p>
        </header>

        <div id="classesGrid" class="flex flex-col gap-10">
            <div class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="mt-4 text-slate-500 font-medium tracking-tight">Cargando tus entrenamientos...</p>
            </div>
        </div>
    </main>

    <footer class="mt-12 py-8 bg-white border-t border-slate-200 text-center">
        <p class="text-slate-400 text-[10px] uppercase tracking-widest font-bold">© 2026 Campus Pastoreo Online • v1.1.0</p>
    </footer>

    <script>
        // URL de tu Script de Google (debe coincidir con el de login)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNCBM7RpjnNCoDCl9M9Gyrg9pg9z3Oq8S0e0ixxH-wafhpyhtXF876lR_U2G-qF3FAOg/exec";

        function formatearFecha(fechaSucia) {
            if (!fechaSucia) return "--/--/--";
            try {
                const d = new Date(fechaSucia);
                if (!isNaN(d.getTime())) {
                    const dia = String(d.getDate()).padStart(2, '0');
                    const mes = String(d.getMonth() + 1).padStart(2, '0');
                    const anio = d.getFullYear();
                    return `${dia}/${mes}/${anio}`;
                }
                return fechaSucia;
            } catch (e) { return fechaSucia; }
        }

        async function guardarComentario(btn, user, fecha, titulo) {
            const container = btn.closest('.comment-box');
            const textarea = container.querySelector('textarea');
            const originalText = btn.innerText;
            const nuevoComentario = textarea.value.trim();

            if (!nuevoComentario) return;

            // Bloquear UI
            btn.disabled = true;
            btn.innerText = "Guardando...";
            textarea.disabled = true;

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Importante para Apps Script
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'updateAlumnoNotas',
                        user: user,
                        fecha: fecha,
                        titulo: titulo,
                        notasAlumno: nuevoComentario
                    })
                });

                // Como usamos no-cors no podemos leer la respuesta, pero si no da error asumimos éxito
                btn.innerText = "¡Guardado!";
                btn.classList.replace('bg-emerald-600', 'bg-blue-500');
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerText = originalText;
                    btn.classList.replace('bg-blue-500', 'bg-emerald-600');
                    textarea.disabled = false;
                }, 3000);

            } catch (error) {
                console.error("Error:", error);
                btn.innerText = "Error";
                btn.classList.replace('bg-emerald-600', 'bg-rose-500');
                textarea.disabled = false;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "../index.html?v=" + new Date().getTime();
        }

        window.onload = function() {
            const rawData = sessionStorage.getItem('alumnoData');
            if (!rawData) { window.location.href = "../index.html"; return; }

            const data = JSON.parse(rawData);
            document.getElementById('displayUserName').innerText = "Alumno: " + data.user;

            const grid = document.getElementById('classesGrid');
            grid.innerHTML = ""; 

            if (!data.classes || data.classes.length === 0) {
                grid.innerHTML = `<div class="bg-white p-16 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center"><p class="text-slate-400 text-lg font-bold">No se encontraron clases.</p></div>`;
                return;
            }

            data.classes.forEach((clase, index) => {
                const card = document.createElement('article');
                card.className = "bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-all flex flex-col group";
                
                const videoId = clase.videoUrl;
                const fechaCorta = formatearFecha(clase.fecha);

                card.innerHTML = `
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                    </div>
                    <div class="p-6 md:p-8 flex-grow flex flex-col gap-6">
                        <div class="flex justify-between items-start">
                            <h3 class="text-2xl font-bold text-slate-800 tracking-tight">${clase.titulo || 'Clase'}</h3>
                            <div class="text-right"><span class="block text-[10px] font-bold text-slate-400 uppercase">Fecha</span><span class="text-sm font-black text-slate-600">${fechaCorta}</span></div>
                        </div>
                        
                        <!-- Notas del Instructor -->
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100">
                            <h4 class="text-[10px] font-extrabold text-emerald-600 uppercase mb-2 flex items-center"><span class="mr-2">💬</span> Instructor</h4>
                            <p class="text-slate-700 text-sm leading-relaxed italic">"${clase.notas || 'Sin comentarios.'}"</p>
                        </div>

                        <!-- Notas del Alumno (Preguntas/Dudas) -->
                        <div class="comment-box flex flex-col gap-3">
                            <h4 class="text-[10px] font-extrabold text-slate-400 uppercase flex items-center"><span class="mr-2">🙋‍♂️</span> Tus dudas o comentarios</h4>
                            <textarea 
                                class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all resize-none"
                                rows="3"
                                placeholder="Escribe aquí tu pregunta para el instructor..."
                            >${clase.notasAlumno || ""}</textarea>
                            <button 
                                onclick="guardarComentario(this, '${data.user}', '${clase.fecha}', '${clase.titulo}')"
                                class="self-end bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] font-bold py-2 px-6 rounded-full transition-all active:scale-95"
                            >Guardar mi comentario</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        };
    </script>
</body>
</html>
